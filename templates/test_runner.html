<!DOCTYPE html>
<html>
<head>
<title>Test Runner</title>
<style>
body{font-family:sans-serif;background:#0f0f0f;color:#e0e0e0;margin:0}
.header{background:#1a1a2e;padding:24px 40px;display:flex;align-items:center;justify-content:space-between}
.header h1{color:#7c6fcd;font-size:24px;margin:0}
.container{max-width:900px;margin:40px auto;padding:0 20px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:24px;margin-bottom:20px}
.card h2{color:#7c6fcd;font-size:16px;margin:0 0 12px}
.agent{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:20px;margin-bottom:16px}
.agent.running{border-color:#7c6fcd}
.agent.done{border-color:#2a5a3a}
.agent.failed{border-color:#5a2a2a}
.atitle{font-weight:600;font-size:15px;margin-bottom:6px}
.astatus{font-size:12px;color:#888}
.astatus.running{color:#7c6fcd}
.astatus.done{color:#4caf7d}
.astatus.failed{color:#ff6666}
.btn{background:#7c6fcd;color:white;border:none;padding:12px 24px;border-radius:8px;font-size:15px;cursor:pointer;margin-bottom:24px}
.btn:disabled{background:#444;cursor:not-allowed}
a.link{color:#7c6fcd;text-decoration:none;font-size:14px}
.info{background:#1a2a3a;border:1px solid #2a3a5a;border-radius:10px;padding:16px;margin-bottom:20px;color:#4a9eff;font-size:14px}
.pass{background:#1a3a2a;border:1px solid #2a5a3a;border-radius:10px;padding:16px;margin-bottom:20px}
.fail{background:#3a1a1a;border:1px solid #5a2a2a;border-radius:10px;padding:16px;margin-bottom:20px}
pre{background:#0a0a0a;padding:16px;border-radius:8px;font-size:12px;color:#4aff9f;max-height:500px;overflow-y:auto;white-space:pre-wrap}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.stat{text-align:center;padding:20px;background:#1a1a1a;border-radius:12px}
.stat-num{font-size:36px;font-weight:bold}
.stat-label{font-size:13px;color:#888;margin-top:4px}
.green{color:#4caf7d}
.red{color:#ff6666}
</style>
</head>
<body>
<div class="header">
  <h1>Test Runner Agent</h1>
  <a href="/logout" style="color:#888;font-size:13px">Logout</a>
</div>
<div class="container">
  <a class="link" href="/result/{{analysis_id}}">&larr; Back</a>
  <div style="margin-top:24px">
    <div class="info">Runs pytest against the generated code and reports pass/fail results.</div>
    {{result_banner}}
    {{stats}}
    <button class="btn" id="testbtn" onclick="runTests()">Run Tests</button>
    <div id="agents">
      <div class="agent" id="card-tests">
        <div class="atitle">Test Runner Agent</div>
        <div class="astatus" id="status-tests">Waiting</div>
      </div>
    </div>
    <div class="card">
      <h2>Test Output</h2>
      <pre id="test-output">{{test_output}}</pre>
    </div>
  </div>
</div>
<script>
const ANALYSIS_ID = "{{analysis_id}}";
async function runTests() {
    const btn = document.getElementById("testbtn");
    btn.disabled = true;
    btn.textContent = "Running tests...";
    document.getElementById("card-tests").className = "agent";
    document.getElementById("status-tests").textContent = "Waiting";
    document.getElementById("status-tests").className = "astatus";
    document.getElementById("test-output").textContent = "";
    var res = await fetch("/run-tests/" + ANALYSIS_ID, {method:"POST"});
    var reader = res.body.getReader();
    var dec = new TextDecoder();
    while(true) {
        var x = await reader.read();
        if(x.done) break;
        var lines = dec.decode(x.value).split("\n").filter(function(l){ return l.indexOf("data: ") === 0; });
        for(var i=0; i<lines.length; i++) {
            try {
                var d = JSON.parse(lines[i].slice(6));
                if(d.agent === "complete") { btn.disabled=false; btn.textContent="Run Again"; location.reload(); continue; }
                if(d.agent === "error") { btn.disabled=false; btn.textContent="Run Tests"; alert(d.message); continue; }
                var card = document.getElementById("card-"+d.agent);
                var stat = document.getElementById("status-"+d.agent);
                if(d.status === "running") { card.className="agent running"; stat.className="astatus running"; stat.textContent=d.message; }
                if(d.status === "done") {
                    card.className = d.passed > 0 ? "agent done" : "agent failed";
                    stat.className = d.passed > 0 ? "astatus done" : "astatus failed";
                    stat.textContent = d.passed + " passed, " + d.failed + " failed";
                    if(d.output) document.getElementById("test-output").textContent = d.output;
                }
            } catch(e) {}
        }
    }
}
</script>
</body>
</html>
